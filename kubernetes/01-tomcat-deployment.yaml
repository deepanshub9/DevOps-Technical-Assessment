# Tomcat deployment with minimum 2 replicas as required.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomcat
  namespace: app-stack
  labels:
    app: tomcat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tomcat
  template:
    metadata:
      labels:
        app: tomcat
    spec:
      containers:
        - name: tomcat
          image: tomcat:9.0-jdk17-temurin
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
---
# Internal service for Tomcat.
# ClusterIP means service is reachable only inside the cluster.
apiVersion: v1
kind: Service
metadata:
  name: tomcat-service
  namespace: app-stack
  labels:
    app: tomcat
spec:
  type: ClusterIP
  selector:
    app: tomcat
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
